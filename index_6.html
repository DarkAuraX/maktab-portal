<style>
  :root{
    --bg:#0c1a28;
    --bg-2:#122A3E;
    --card:#faf5e9;
    --card-soft:#f2ead9;
    --panel:#152c40;
    --panel-2:#1c3750;
    --gold:#c9a15a;
    --gold-light:#e6c988;
    --teal:#2a7f6a;
    --teal-light:#3fa88d;
    --rose:#b0503a;
    --rose-light:#cf7259;
    --ink:#14202c;
    --paper-ink:#2a2016;
    --muted:#8fa3b8;
    --muted-2:#6d7f92;
    --line:rgba(201,161,90,.28);
    --line-soft:rgba(255,255,255,.08);
    --shadow: 0 20px 50px rgba(0,0,0,.35);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 15% -10%, #16324a 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #0f2233 0%, transparent 55%),
      var(--bg);
    color:#e9eef3;
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .hidden{display:none !important;}
  ::selection{ background:var(--gold-light); color:#1a1305; }
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-thumb{background:#2a4a63; border-radius:10px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .arabesque{
    position:absolute; inset:0; z-index:0; opacity:.10;
    background-image:
      repeating-linear-gradient(45deg, var(--gold) 0 1px, transparent 1px 42px),
      repeating-linear-gradient(-45deg, var(--gold) 0 1px, transparent 1px 42px);
    mask-image: radial-gradient(circle at 50% 30%, black 0%, transparent 70%);
  }
  .brand-mark{
    position:relative; z-index:1;
    display:flex; align-items:center; gap:12px;
    margin-bottom:34px;
    color:var(--gold-light);
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:12.5px;
    font-weight:600;
  }
  .brand-mark svg{width:26px;height:26px;}
  .brand-mark .divider{width:34px;height:1px;background:var(--line);}

  .quote-stage{
    position:relative; z-index:1;
    width:min(720px, 92vw);
    text-align:center;
    margin-bottom:38px;
  }
  .quote-card{ display:none; animation:fadeUp .6s ease; }
  .quote-card.active{ display:block; }

  /* ============ APP SHELL ============ */

  header.topbar{
    display:flex; align-items:center; justify-content:space-between;

  .topbar-left .titles .t2{ font-size:11px; color:var(--muted); letter-spacing:.06em; }
  .topbar-right{ display:flex; align-items:center; gap:14px; }
  .user-chip{

  }
  .settings-avatar-preview label{

    text-align:center; padding:6px;
  }

  .user-chip .u-name{ font-size:12.5px; font-weight:600; color:#fff; }
  .user-chip .u-role{ font-size:10px; color:var(--gold-light); text-transform:uppercase; letter-spacing:.06em; }
  .btn-logout{
    background:none; border:1px solid var(--line-soft); color:var(--muted);

  }

  /* Ribbon tabs */
  nav.ribbons{
    display:flex; gap:10px; padding:0 26px; margin-top:-1px;
    background:var(--bg); overflow-x:auto;
  }
  .ribbon{
    position:relative;
    padding:11px 20px 16px;
    font-size:13px; font-weight:600; letter-spacing:.02em;
    color:var(--muted); background:var(--panel);
    border:1px solid var(--line-soft); border-bottom:none;
    border-radius:10px 10px 0 0;
    cursor:pointer; white-space:nowrap;
    display:flex; align-items:center; gap:8px;
    transition:transform .18s ease, color .18s ease, background .18s ease;
    transform-origin:top center;
  }
  .ribbon:hover{ transform:translateY(-3px) rotate(-.4deg); color:#fff; }
  .ribbon.active{ color:#fff; background:var(--panel-2); }
  .ribbon::after{
    content:""; position:absolute; left:50%; bottom:-8px; transform:translateX(-50%);
    width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent;
    border-top:8px solid var(--panel); transition:.18s;
  }
  .ribbon.active::after{ border-top-color:var(--panel-2); }
  .ribbon .dot{ width:7px; height:7px; border-radius:50%; }

  main{ flex:1; padding:26px; max-width:1180px; width:100%; margin:0 auto; }

  /* Stat cards */
  .stat-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:24px; }
  .stat-card{
    background:var(--panel); border:1px solid var(--line-soft); border-radius:var(--radius);
    padding:16px 18px;
  }
  .stat-card .label{ font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
  .stat-card .value{ font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:600; color:#fff; }
  .stat-card .value small{ font-size:13px; color:var(--muted); font-weight:400; }
  .stat-card.gold .value{ color:var(--gold-light); }
  .stat-card.teal .value{ color:var(--teal-light); }
  .stat-card.rose .value{ color:var(--rose-light); }

  /* ===== Overview / Dashboard v2 ===== */
  .hero-banner{
    position:relative; overflow:hidden;
    background:linear-gradient(120deg, var(--panel-2) 0%, var(--panel) 60%, #16324a 100%);
    border:1px solid var(--line-soft); border-radius:18px;
    padding:26px 28px; margin-bottom:22px;
  }
  .hero-banner::before{
    content:""; position:absolute; inset:0; opacity:.08; pointer-events:none;
    background-image: repeating-linear-gradient(45deg, var(--gold) 0 1px, transparent 1px 38px);
    mask-image: radial-gradient(circle at 85% 20%, black 0%, transparent 65%);
  }
  .hero-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; position:relative; z-index:1; }
  .hero-greeting{ font-family:'Fraunces',serif; font-weight:600; font-size:25px; color:#fff; margin:0 0 5px; display:flex; align-items:center; gap:10px; }

  .hero-quote .hq-en{ font-family:'Fraunces',serif; font-style:italic; color:#c9d6e2; font-size:11.5px; margin:0; }

  .ring-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:22px; }
  .ring-card{
    background:var(--panel); border:1px solid var(--line-soft); border-radius:var(--radius);
    padding:16px 18px; display:flex; align-items:center; gap:16px; cursor:pointer; transition:.18s;
  }
  .ring-card:hover{ border-color:var(--line); transform:translateY(-2px); }
  .ring-wrap{ position:relative; width:72px; height:72px; flex-shrink:0; }
  .ring{ width:100%; height:100%; border-radius:50%; }
  .ring-inner{
    position:absolute; inset:7px; border-radius:50%; background:var(--panel);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
  }
  .ring-inner .num{ font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:15px; color:#fff; }
  .ring-card .rc-label{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin-bottom:4px; }
  .ring-card .rc-value{ font-size:13.5px; color:#e9eef3; font-weight:600; }
  .ring-card .rc-sub{ font-size:11.5px; color:var(--muted-2); margin-top:2px; }

  .dash-columns{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:800px){ .dash-columns{ grid-template-columns:1fr; } }
  .dash-panel{
    background:var(--panel); border:1px solid var(--line-soft); border-radius:var(--radius); padding:18px;
  }
  .dash-panel-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .dash-panel-head h3{ font-family:'Fraunces',serif; font-size:14.5px; color:#fff; margin:0; font-weight:600; }
  .dash-panel-head button{ background:none; border:none; color:var(--gold-light); font-size:11.5px; cursor:pointer; font-weight:600; }
  .dash-item{
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--line-soft); cursor:pointer;
  }

  .dash-item:hover .dash-item-title{ color:var(--gold-light); }
  .dash-item-title{ font-size:13px; color:#e9eef3; transition:.15s; }
  .dash-item-meta{ font-size:11px; color:var(--muted); white-space:nowrap; }
  .dash-empty{ color:var(--muted); font-size:12.5px; padding:8px 0; }

  .section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .section-head h1{ font-family:'Fraunces',serif; font-size:21px; margin:0; color:#fff; font-weight:600; }
  .section-head p{ margin:2px 0 0; color:var(--muted); font-size:13px; }

  .btn{
    border:none; cursor:pointer; font-family:'Inter',sans-serif; font-weight:600; font-size:13px;
    padding:10px 16px; border-radius:9px; transition:.15s; display:inline-flex; align-items:center; gap:7px;
  }
  .btn-primary{ background:var(--gold); color:#241a05; }
  .btn-primary:hover{ background:var(--gold-light); }
  .btn-ghost{ background:transparent; border:1px solid var(--line-soft); color:#e9eef3; }
  .btn-ghost:hover{ border-color:var(--line); }
  .btn-sm{ padding:6px 11px; font-size:12px; }
  .btn-icon{ background:transparent; border:none; cursor:pointer; color:var(--muted); font-size:15px; padding:4px; }
  .btn-icon:hover{ color:#fff; }

  /* Homework cards */
  .hw-grid{ display:flex; flex-direction:column; gap:12px; }
  .hw-card{
    background:var(--card); color:var(--paper-ink);
    border-radius:var(--radius); padding:18px 20px;
    box-shadow:var(--shadow);
    position:relative; overflow:hidden;
  }
  .hw-card::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:5px;

  .hw-card.status-completed::before{ background:var(--teal); }
  .hw-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
  .hw-title{ font-family:'Fraunces',serif; font-weight:600; font-size:17px; margin:0 0 4px; }
  .hw-meta{ font-size:12px; color:#6d604a; display:flex; gap:12px; flex-wrap:wrap; margin-top:4px;}
  .hw-desc{ font-size:13.5px; color:#4a3f2d; margin:10px 0 0; line-height:1.55; }
  .badge{
    font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; font-weight:700;
    padding:4px 9px; border-radius:20px; white-space:nowrap;
  }
  .badge.pending{ background:#f4dfd6; color:#9c4224; }

  .badge.pass{ background:#d9ecdf; color:#1f6f4e; }
  .badge.fail{ background:#f4dfd6; color:#9c4224; }
  .badge.present{ background:#d9ecdf; color:#1f6f4e; }
  .badge.absent{ background:#f4dfd6; color:#9c4224; }
  .badge.holiday{ background:#e2e6ee; color:#465066; }

  .hw-row{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:10px; }
  .marks-pill{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13.5px;

  }

    width:34px; height:34px; border-radius:9px; border:1.5px solid #d8cbb0; background:#fff;
    cursor:pointer; font-size:15px; font-weight:700; transition:.15s; color:#8a7c5f;
  }
  .tc-btn.tick.on{ background:var(--teal); border-color:var(--teal); color:#fff; }

  .photo-strip{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .photo-thumb{
    width:56px; height:56px; border-radius:8px; object-fit:cover; cursor:pointer;
    border:1px solid #d8cbb0;
  }
  .add-photo-btn{
    width:56px; height:56px; border-radius:8px; border:1.5px dashed #c9b98e; background:#f4ecd9;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:#8a6f34; font-size:20px;
  }
  .marks-edit{ display:flex; align-items:center; gap:6px; }
  .marks-edit input{
    width:56px; padding:6px 8px; border-radius:7px; border:1px solid #d8cbb0; font-family:'IBM Plex Mono',monospace;
  }

  /* Attendance */
  .cal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-header .month-label{ font-family:'Fraunces',serif; font-size:16px; color:#fff; font-weight:600; }

  .cal-grid{
    display:grid; grid-template-columns:repeat(7,1fr); gap:8px;
    background:var(--panel); border:1px solid var(--line-soft); border-radius:var(--radius); padding:16px;
  }

  .cal-cell{

    gap:3px; background:var(--panel-2); border:1px solid var(--line-soft); position:relative; font-size:12.5px;
    color:#cfe0ee;

    color:var(--muted-2);
  }
  .cal-cell.clickable{ cursor:pointer; }
  .cal-cell.clickable:hover{ border-color:var(--gold); }
  .cal-cell .daynum{ font-family:'IBM Plex Mono',monospace; font-weight:600; }
  .cal-cell .status-icon{ font-size:13px; }
  .cal-cell.st-present{ background:rgba(42,127,106,.28); border-color:var(--teal); }
  .cal-cell.st-absent{ background:rgba(176,80,58,.28); border-color:var(--rose); }
  .cal-cell.st-holiday{ background:rgba(143,163,184,.2); }
  .cal-cell.today{ box-shadow:inset 0 0 0 2px var(--gold); }
  .legend{ display:flex; gap:16px; margin-top:14px; flex-wrap:wrap; }
  .legend .item{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--muted); }
  .legend .sw{ width:12px; height:12px; border-radius:4px; }

  /* Tests */
  .test-card{
    background:var(--card); color:var(--paper-ink); border-radius:var(--radius);
    padding:18px 20px; box-shadow:var(--shadow); margin-bottom:12px;
  }

  .test-name{ font-family:'Fraunces',serif; font-weight:600; font-size:16.5px; margin:0; }
  .test-date{ font-size:11.5px; color:#7a6c50; margin-top:3px; }
  .progress-track{ height:8px; background:#e9dfc8; border-radius:6px; margin:12px 0 8px; overflow:hidden; }

  .progress-fill.fail{ background:var(--rose); }
  .test-scoreline{ display:flex; justify-content:space-between; font-size:12.5px; color:#6d604a; }
  .remarks-box{ margin-top:10px; font-size:13px; background:#f4ecd9; padding:9px 12px; border-radius:8px; color:#5a4a24; }

  /* Empty state */
  .empty-state{
    text-align:center; padding:50px 20px; color:var(--muted); background:var(--panel);
    border:1px dashed var(--line-soft); border-radius:var(--radius);
  }

  /* Announcements */
  .announce-card{
    background:var(--card); color:var(--paper-ink); border-radius:var(--radius);
    padding:18px 20px; box-shadow:var(--shadow); margin-bottom:12px; position:relative; overflow:hidden;
  }

  .announce-title{ font-family:'Fraunces',serif; font-weight:600; font-size:16.5px; margin:0 0 4px; }
  .announce-meta{ font-size:11.5px; color:#7a6c50; }
  .announce-body{ font-size:13.5px; color:#4a3f2d; margin:10px 0 0; line-height:1.55; white-space:pre-wrap; }

  /* Diary */
  .diary-card{
    background:var(--card); color:var(--paper-ink); border-radius:var(--radius);
    padding:18px 20px; box-shadow:var(--shadow); margin-bottom:12px; position:relative; overflow:hidden;
  }
  .diary-card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--gold); }

  /* Chat */
  .chat-shell{

    background:var(--panel); border:1px solid var(--line-soft); border-radius:var(--radius); overflow:hidden;

  .chat-bubble-row.theirs{ align-self:flex-start; align-items:flex-start; }

<script>
/* ============================================================
   DATA + STORAGE LAYER (with graceful fallback outside Claude)
============================================================ */
async function storeGet(key, shared=false){

  const path = shared ? "shared" : "personal";

  try{
    const snap = await window.firebaseGetDoc(
      window.firebaseDoc(window.db, path, key)
    );

    if(!snap.exists()) return null;

    return snap.data().value;

  }catch(err){
    console.error(err);
    return null;
  }
}

async function storeSet(key, value, shared=false){

  const path = shared ? "shared" : "personal";

  try{
    await window.firebaseSetDoc(
      window.firebaseDoc(window.db, path, key),
      {
        value: value,
        updatedAt: Date.now()
      }
    );
  }catch(err){
    console.error(err);
  }
}

const USERS = {
  bilal:   { name:'Bilal Bin Altaf',   role:'student', initials:'BA', color:'#e6c988' },
  hammaad: { name:'Hammaad Abu Ateeq',  role:'tutor',   initials:'HA', color:'#3fa88d' },
  parents: { name:'Altaf & Humera',    role:'parent',  initials:'A&H', color:'#b98bce' },
};

// Default client-side passcodes (this is a family-use portal, not a secure backend)
const DEFAULT_PASSWORDS = {
  bilal:   'bilal2026',
  hammaad: 'hammaad2026',
  parents: 'parents2026',
};

// Runtime account overrides: { [key]: { photo: dataURL|null, password: string } }
let ACCOUNTS = {};
async function loadAccounts(){
  for(const key of Object.keys(USERS)){
    const stored = await storeGet(`account:${key}`, true);
    ACCOUNTS[key] = {
      photo: (stored && stored.photo) || null,
      password: (stored && stored.password) || DEFAULT_PASSWORDS[key],
    };
  }
}
async function saveAccount(key){
  await storeSet(`account:${key}`, ACCOUNTS[key], true);
}
function avatarInner(key, size){
  const u = USERS[key];
  const acc = ACCOUNTS[key] || {};
  if(acc.photo){
    return `<img src="${acc.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  }
  return u.initials;
}

const QUOTES = [

  },
  {

    en:'Whoever follows a path in search of knowledge, Allah makes easy for him a path to Paradise.',
    src:'Hadith · Sahih Muslim'
  },

  },
  {

    en:'Whoever strives with sincerity, finds success.',
    src:'Arabic proverb'
  }
];

let currentUser = null; // { key, name, role, initials, color }
let activeTab = 'overview';
let calMonthOffset = 0;

const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const WEEKEND_DAYS = [5,6]; // Fri=5, Sat=6

}

  const t = document.getElementById('toast');

  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);

/* ============================================================
   LOGIN SCREEN
============================================================ */
async function initLogin(){
  await loadAccounts();
  const stage = document.getElementById('quote-stage');
  const dots = document.getElementById('quote-dots');
  QUOTES.forEach((q,i)=>{
    const card = document.createElement('div');
    card.className = 'quote-card' + (i===0 ? ' active' : '');
    card.innerHTML = `<p class="quote-ar">${q.ar}</p><p class="quote-en">"${q.en}"</p><p class="quote-src">${q.src}</p>`;
    stage.appendChild(card);
    const dot = document.createElement('button');
    if(i===0) dot.classList.add('active');
    dot.addEventListener('click', ()=> setQuote(i));
    dots.appendChild(dot);
  });
  let qi = 0;
  function setQuote(i){
    qi = i;
    [...stage.children].forEach((c,idx)=>c.classList.toggle('active', idx===i));
    [...dots.children].forEach((d,idx)=>d.classList.toggle('active', idx===i));
  }
  setInterval(()=> setQuote((qi+1)%QUOTES.length), 7000);

  renderAvatarGrid();
}

function renderAvatarGrid(){
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = '';
  Object.entries(USERS).forEach(([key,u])=>{
    const card = document.createElement('div');
    card.className = 'avatar-card';
    card.innerHTML = `
      <div class="avatar-circle" style="background:${u.color}; overflow:hidden;">${avatarInner(key)}</div>
      <div class="name">${u.name}</div>
      <div class="role">${u.role}</div>
    `;
    card.addEventListener('click', ()=> openPasswordModal(key));
    grid.appendChild(card);
  });
}

function openPasswordModal(key){
  const u = USERS[key];
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" style="text-align:center;">
      <div class="avatar-circle" style="background:${u.color}; margin:0 auto 14px;">${u.initials}</div>
      <h3 style="margin-bottom:2px;">${u.name}</h3>
      <p style="color:#7a6c50; font-size:12.5px; text-transform:uppercase; letter-spacing:.06em; margin:0 0 18px;">${u.role}</p>
      <div class="field" style="text-align:left;">
        <label>Password</label>
        <input id="pw-input" type="password" placeholder="Enter your password" autocomplete="off">
      </div>
      <p id="pw-error" style="color:#b0503a; font-size:12.5px; min-height:16px; margin:4px 0 0;"></p>
      <div class="modal-actions" style="justify-content:center;">
        <button class="btn btn-ghost" id="pw-cancel">Cancel</button>
        <button class="btn btn-primary" id="pw-submit">Enter Portal</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  const input = backdrop.querySelector('#pw-input');
  const errorEl = backdrop.querySelector('#pw-error');
  input.focus();

  function attempt(){
    if(input.value === ACCOUNTS[key].password){
      backdrop.remove();
      login(key);
    }else{
      errorEl.textContent = 'Incorrect password. Please try again.';
      input.value = '';
      input.focus();
    }
  }
  backdrop.querySelector('#pw-submit').addEventListener('click', attempt);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') attempt(); });
  backdrop.querySelector('#pw-cancel').addEventListener('click', ()=> backdrop.remove());
  backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) backdrop.remove(); });
}

async function login(key){
  currentUser = { key, ...USERS[key] };
  await storeSet('lastUser', key, false);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  refreshChipAvatar();
  document.getElementById('chip-name').textContent = currentUser.name;
  document.getElementById('chip-role').textContent = currentUser.role;
  activeTab = 'overview';
  document.querySelectorAll('.ribbon').forEach(r=>r.classList.toggle('active', r.dataset.tab==='overview'));
  renderTab();
}

function refreshChipAvatar(){
  const chip = document.getElementById('chip-avatar');
  chip.style.background = currentUser.color;
  chip.innerHTML = avatarInner(currentUser.key);
}

function logout(){
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

document.getElementById('settings-btn').addEventListener('click', ()=>{
  if(currentUser) openSettingsModal();
});

function openSettingsModal(){
  const key = currentUser.key;
  const u = USERS[key];
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" style="text-align:center;">
      <h3 style="margin-bottom:2px;">Account Settings</h3>
      <p style="color:#7a6c50; font-size:12.5px; margin:0 0 18px;">${u.name} · ${u.role}</p>

      <div class="settings-avatar-preview" style="background:${u.color};">
        <span id="settings-avatar-img" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">${avatarInner(key)}</span>
        <label>Change photo<input id="photo-input" type="file" accept="image/*" style="display:none;"></label>
      </div>
      <p style="font-size:11.5px; color:var(--muted-2); margin:-8px 0 20px;">Hover the picture to upload a new one</p>

      <div style="text-align:left; border-top:1px solid #e3d8bd; padding-top:16px; margin-top:4px;">
        <p style="font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:#7a6c50; font-weight:700; margin:0 0 12px;">Change password</p>
        <div class="field"><label>Current password</label><input id="s-current" type="password" autocomplete="off"></div>
        <div class="field"><label>New password</label><input id="s-new" type="password" autocomplete="off"></div>
        <div class="field"><label>Confirm new password</label><input id="s-confirm" type="password" autocomplete="off"></div>
      </div>
      <p id="s-error" style="color:#b0503a; font-size:12.5px; min-height:16px; margin:4px 0 0;"></p>

      <div class="modal-actions" style="justify-content:center;">
        <button class="btn btn-ghost" id="s-cancel">Close</button>
        <button class="btn btn-primary" id="s-save">Save changes</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  backdrop.querySelector('#photo-input').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const resized = await resizeImage(file, 300, 0.82);
    ACCOUNTS[key].photo = resized;
    await saveAccount(key);
    document.getElementById('settings-avatar-img').innerHTML = avatarInner(key);
    refreshChipAvatar();
    renderAvatarGrid();
    showToast('Profile picture updated');
  });

  backdrop.querySelector('#s-cancel').addEventListener('click', ()=> backdrop.remove());
  backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) backdrop.remove(); });

  backdrop.querySelector('#s-save').addEventListener('click', async ()=>{
    const current = backdrop.querySelector('#s-current').value;
    const next = backdrop.querySelector('#s-new').value;
    const confirm2 = backdrop.querySelector('#s-confirm').value;
    const errorEl = backdrop.querySelector('#s-error');

    if(!current && !next && !confirm2){
      backdrop.remove();
      return;
    }
    if(current !== ACCOUNTS[key].password){
      errorEl.textContent = 'Current password is incorrect.';
      return;
    }
    if(!next || next.length < 4){
      errorEl.textContent = 'New password must be at least 4 characters.';
      return;
    }
    if(next !== confirm2){
      errorEl.textContent = 'New passwords do not match.';
      return;
    }
    ACCOUNTS[key].password = next;
    await saveAccount(key);
    showToast('Password updated');
    backdrop.remove();
  });
}

document.getElementById('ribbons').addEventListener('click', (e)=>{

});

async function renderTab(){
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="empty-state">Loading…</div>';
  if(activeTab !== 'chat') stopChatPoll();
  if(activeTab==='overview') return renderOverview();
  if(activeTab==='homework') return renderHomework();
  if(activeTab==='attendance') return renderAttendance();
  if(activeTab==='tests') return renderTests();
  if(activeTab==='announcements') return renderAnnouncements();
  if(activeTab==='diary') return renderDiary();
  if(activeTab==='chat') return renderChat();
}

/* ============================================================
   OVERVIEW
============================================================ */
async function renderOverview(){
  const hw = (await storeGet('homework', true)) || [];
  const att = (await storeGet('attendance', true)) || {};
  const tests = (await storeGet('tests', true)) || [];
  const ann = (await storeGet('announcements', true)) || [];

  const pending = hw.filter(h=>h.status!=='completed').length;
  const completedCount = hw.length - pending;
  const hwPct = hw.length ? Math.round((completedCount/hw.length)*100) : 0;

  const monthKey = new Date().toISOString().slice(0,7);
  const monthEntries = Object.entries(att).filter(([d])=>d.startsWith(monthKey));
  const present = monthEntries.filter(([,s])=>s==='present').length;
  const absent = monthEntries.filter(([,s])=>s==='absent').length;
  const attPct = (present+absent) ? Math.round((present/(present+absent))*100) : 0;

  const lastTest = tests[tests.length-1];
  const testPct = lastTest ? Math.round((lastTest.obtained/lastTest.max)*100) : 0;

  const hour = new Date().getHours();
  const greetIcon = hour<12 ? '🌅' : hour<17 ? '☀️' : hour<20 ? '🌇' : '🌙';
  const greetWord = hour<12 ? 'Good morning' : hour<17 ? 'Good afternoon' : hour<20 ? 'Good evening' : 'Assalamu alaikum';
  const quote = QUOTES[new Date().getDate() % QUOTES.length];

  const dueSoon = hw.filter(h=>h.status!=='completed')
    .slice().sort((a,b)=> a.dueDate.localeCompare(b.dueDate)).slice(0,3);
  const recentAnn = ann.slice().reverse().slice(0,3);

  function ring(pct, color, label, sub){
    return `
      <div class="ring-wrap">
        <div class="ring" style="background:conic-gradient(${color} ${pct*3.6}deg, rgba(255,255,255,.08) 0deg);"></div>
        <div class="ring-inner"><span class="num">${pct}%</span></div>
      </div>
      <div>
        <div class="rc-label">${label}</div>
        <div class="rc-value">${sub}</div>
      </div>
    `;
  }
  function goTab(tab){
    document.querySelector(`.ribbon[data-tab="${tab}"]`)?.click();
  }

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="hero-banner">
      <div class="hero-top">
        <div>
          <h1 class="hero-greeting">${greetIcon} ${greetWord}, ${currentUser.name.split(' ')[0]}</h1>
          <p class="hero-sub">${new Date().toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long', year:'numeric'})} · signed in as ${currentUser.role}</p>
        </div>
        <div class="hero-quote">
          <p class="hq-ar">${quote.ar}</p>
          <p class="hq-en">"${quote.en}"</p>
        </div>
      </div>
    </div>

    <div class="ring-row">
      <div class="ring-card" id="ring-hw">${ring(hwPct, 'var(--rose-light)', 'Homework done', `${completedCount} of ${hw.length||0} tasks`)}</div>
      <div class="ring-card" id="ring-att">${ring(attPct, 'var(--teal-light)', 'Attendance', `${present} present this month`)}</div>
      <div class="ring-card" id="ring-test">${ring(testPct, 'var(--gold-light)', 'Latest test', lastTest ? `${lastTest.obtained}/${lastTest.max} · ${lastTest.name}` : 'No tests yet')}</div>
      <div class="ring-card" id="ring-pending" style="justify-content:center;">
        <div>
          <div class="rc-label">Pending right now</div>
          <div class="rc-value" style="font-family:'IBM Plex Mono',monospace; font-size:22px; color:var(--rose-light);">${pending} task${pending===1?'':'s'}</div>
          <div class="rc-sub">Tap to view Homework</div>
        </div>
      </div>
    </div>

    <div class="dash-columns">
      <div class="dash-panel">
        <div class="dash-panel-head">
          <h3>📝 Homework due soon</h3>
          <button id="see-all-hw">View all</button>
        </div>
        <div id="dash-hw-list"></div>
      </div>
      <div class="dash-panel">
        <div class="dash-panel-head">
          <h3>📢 Latest announcements</h3>
          <button id="see-all-ann">View all</button>
        </div>
        <div id="dash-ann-list"></div>
      </div>
    </div>
  `;

  ['ring-hw','ring-pending'].forEach(id=> document.getElementById(id).addEventListener('click', ()=>goTab('homework')));
  document.getElementById('ring-att').addEventListener('click', ()=>goTab('attendance'));
  document.getElementById('ring-test').addEventListener('click', ()=>goTab('tests'));
  document.getElementById('see-all-hw').addEventListener('click', ()=>goTab('homework'));
  document.getElementById('see-all-ann').addEventListener('click', ()=>goTab('announcements'));

  const hwList = document.getElementById('dash-hw-list');
  if(!dueSoon.length){
    hwList.innerHTML = `<div class="dash-empty">Nothing pending — nicely done! 🎉</div>`;
  }else{
    dueSoon.forEach(h=>{
      const row = document.createElement('div');

function renderHwCard(hw, isTutor, isStudent){
  const el = document.createElement('div');
  el.className = `hw-card status-${hw.status}`;
  const marksDisplay = (hw.obtained!==null && hw.obtained!==undefined)
    ? `${hw.obtained}/${hw.max}` : 'Not graded';

  el.innerHTML = `
    <div class="hw-top">
      <div>
        <p class="hw-title">${hw.title}</p>
        <div class="hw-meta">
          <span>📅 Due ${fmtDate(hw.dueDate)}</span>
          <span>🎯 Max ${hw.max} marks</span>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="badge ${hw.status}">${hw.status}</span>
        ${isTutor ? `<button class="btn-icon" data-act="edit">✎</button><button class="btn-icon" data-act="del">🗑</button>` : ''}
      </div>
    </div>
    ${hw.description ? `<p class="hw-desc">${hw.description}</p>` : ''}
    <div class="hw-row">
      <div class="tick-cross" data-role="ticks"></div>
      <div class="marks-area"></div>
    </div>
    <div class="photo-strip" data-role="photos"></div>
  `;

  // tick / cross (student only can toggle; others view state via badge, but show icons read-only for context)
  const ticksWrap = el.querySelector('[data-role="ticks"]');
  if(isStudent){
    ticksWrap.innerHTML = `
      <button class="tc-btn tick ${hw.status==='completed'?'on':''}" data-set="completed">✓</button>
      <button class="tc-btn cross ${hw.status==='pending'?'on':''}" data-set="pending">✕</button>
    `;
    ticksWrap.querySelectorAll('.tc-btn').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        const list = await getHomework();
        const target = list.find(h=>h.id===hw.id);
        target.status = btn.dataset.set;
        await saveHomework(list);
        showToast(btn.dataset.set==='completed' ? 'Marked as completed' : 'Marked as not done');
        renderHomework();
      });
    });
  } else {
    ticksWrap.innerHTML = `<span style="font-size:12px;color:#8a7c5f;">${hw.status==='completed' ? '✓ Student marked complete' : '✕ Student marked not done'}</span>`;
  }

  // marks
  const marksArea = el.querySelector('.marks-area');
  if(isTutor){
    marksArea.innerHTML = `
      <div class="marks-edit">
        <input type="number" min="0" max="${hw.max}" placeholder="0" value="${hw.obtained ?? ''}" data-role="marks-input">
        <span style="font-size:12.5px;color:#7a6c50;">/ ${hw.max}</span>
        <button class="btn btn-sm btn-primary" data-role="save-marks">Save</button>
      </div>
    `;
    marksArea.querySelector('[data-role="save-marks"]').addEventListener('click', async ()=>{
      const val = marksArea.querySelector('[data-role="marks-input"]').value;
      const list = await getHomework();
      const target = list.find(h=>h.id===hw.id);
      target.obtained = val==='' ? null : Math.min(Number(val), hw.max);
      await saveHomework(list);
      showToast('Marks saved');
      renderHomework();
    });
  } else {
    marksArea.innerHTML = `<span class="marks-pill">${marksDisplay}</span>`;
  }

  // photos
  const photoStrip = el.querySelector('[data-role="photos"]');
  (hw.photos||[]).forEach(src=>{
    const img = document.createElement('img');
    img.src = src; img.className='photo-thumb';
    img.addEventListener('click', ()=> openPhotoModal(src));
    photoStrip.appendChild(img);
  });
  if(isStudent){
    const addBtn = document.createElement('label');
    addBtn.className = 'add-photo-btn';
    addBtn.innerHTML = `+ <input type="file" accept="image/*" style="display:none">`;
    addBtn.querySelector('input').addEventListener('change', async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const resized = await resizeImage(file, 700, 0.72);
      const list = await getHomework();
      const target = list.find(h=>h.id===hw.id);
      target.photos = target.photos || [];
      target.photos.push(resized);
      await saveHomework(list);
      showToast('Photo added');
      renderHomework();
    });
    photoStrip.appendChild(addBtn);
  }

  // tutor edit/delete
  if(isTutor){
    el.querySelector('[data-act="edit"]').addEventListener('click', ()=> openHwModal(hw));
    el.querySelector('[data-act="del"]').addEventListener('click', async ()=>{
      if(!confirm('Delete this homework?')) return;
      const list = (await getHomework()).filter(h=>h.id!==hw.id);
      await saveHomework(list);
      showToast('Homework deleted');
      renderHomework();
    });
  }

  return el;
}

function resizeImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

============================================================ */
async function getAttendance(){ return (await storeGet('attendance', true)) || {}; }
async function saveAttendance(obj){ await storeSet('attendance', obj, true); }

async function renderAttendance(){
  const att = await getAttendance();
  const isTutor = currentUser.role==='tutor';
  const now = new Date();
  now.setMonth(now.getMonth()+calMonthOffset);
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthLabel = now.toLocaleDateString('en-GB',{month:'long', year:'numeric'});

  const monthPrefix = `${year}-${String(month+1).padStart(2,'0')}`;
  const entries = Object.entries(att).filter(([d])=>d.startsWith(monthPrefix));
  const present = entries.filter(([,s])=>s==='present').length;
  const absent = entries.filter(([,s])=>s==='absent').length;
  const holiday = entries.filter(([,s])=>s==='holiday').length;
  const pct = (present+absent) ? Math.round((present/(present+absent))*100) : null;

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-head">
      <div>
        <h1>Attendance</h1>
        <p>Classes run Sunday–Thursday · Friday &amp; Saturday are holidays</p>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-card teal"><div class="label">Present</div><div class="value">${present}</div></div>
      <div class="stat-card rose"><div class="label">Absent</div><div class="value">${absent}</div></div>
      <div class="stat-card gold"><div class="label">Holidays taken</div><div class="value">${holiday}</div></div>
      <div class="stat-card"><div class="label">Attendance rate</div><div class="value">${pct===null?'—':pct+'%'}</div></div>
    </div>
    <div class="cal-header">
      <div class="cal-nav"><button class="btn btn-ghost btn-sm" id="cal-prev">‹ Prev</button></div>
      <div class="month-label">${monthLabel}</div>
      <div class="cal-nav"><button class="btn btn-ghost btn-sm" id="cal-next">Next ›</button></div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <div class="item"><span class="sw" style="background:rgba(42,127,106,.6)"></span>Present</div>
      <div class="item"><span class="sw" style="background:rgba(176,80,58,.6)"></span>Absent</div>
      <div class="item"><span class="sw" style="background:rgba(143,163,184,.4)"></span>Holiday / Weekend</div>
      ${isTutor ? '<div class="item">Click a Sun–Thu date to cycle: unmarked → present → absent → holiday</div>' : ''}
    </div>
  `;

  const grid = document.getElementById('cal-grid');
  DOW.forEach(d=>{
    const el = document.createElement('div');
    el.className='cal-dow'; el.textContent = d;
    grid.appendChild(el);
  });
  for(let i=0;i<firstDay;i++){
    const el = document.createElement('div'); el.className='cal-cell empty';
    grid.appendChild(el);
  }
  const todaysStr = todayStr();
  for(let day=1; day<=daysInMonth; day++){
    const dow = new Date(year, month, day).getDay();
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isWeekend = WEEKEND_DAYS.includes(dow);
    const status = att[dateStr];
    const cell = document.createElement('div');
    let cls = 'cal-cell';
    if(isWeekend) cls += ' weekend';
    if(status==='present') cls += ' st-present';
    if(status==='absent') cls += ' st-absent';
    if(status==='holiday') cls += ' st-holiday';
    if(dateStr===todaysStr) cls += ' today';
    const canClick = isTutor && !isWeekend && dateStr <= todaysStr;
    if(canClick) cls += ' clickable';
    cell.className = cls;
    const icon = status==='present' ? '✓' : status==='absent' ? '✕' : status==='holiday' ? '—' : (isWeekend ? '' : '');
    cell.innerHTML = `<span class="daynum">${day}</span><span class="status-icon">${icon}</span>`;
    if(canClick){
      cell.addEventListener('click', async ()=>{
        const order = [undefined,'present','absent','holiday'];
        const idx = order.indexOf(status);
        const next = order[(idx+1)%order.length];
        const data = await getAttendance();
        if(next===undefined) delete data[dateStr]; else data[dateStr]=next;
        await saveAttendance(data);
        renderAttendance();
      });
    }
    grid.appendChild(cell);
  }

  document.getElementById('cal-prev').addEventListener('click', ()=>{ calMonthOffset--; renderAttendance(); });
  document.getElementById('cal-next').addEventListener('click', ()=>{ calMonthOffset++; renderAttendance(); });
}

    const title = backdrop.querySelector('#a-title').value.trim();
    const body = backdrop.querySelector('#a-body').value.trim();
    if(!title || !body){ showToast('Please fill in both fields'); return; }
    const list = await getAnnouncements();
    list.push({ id:uid(), title, body, author:currentUser.name, postedAt:Date.now() });
    await saveAnnouncements(list);
    backdrop.remove();
    showToast('Announcement posted');
    renderAnnouncements();
  });
}

/* ============================================================
   DAILY DIARY
============================================================ */
async function getDiary(){ return (await storeGet('diary', true)) || []; }
async function saveDiary(list){ await storeSet('diary', list, true); }

const MOODS = ['😊','🙂','😐','😔','😫'];

function calcStreak(list){
  const dates = new Set(list.map(e=>e.date));
  let streak = 0;
  let cursor = new Date();
  while(true){
    const ds = cursor.toISOString().slice(0,10);
    if(dates.has(ds)){ streak++; cursor.setDate(cursor.getDate()-1); }
    else break;
  }
  return streak;
}

async function renderDiary(){
  const list = await getDiary();
  const isStudent = currentUser.role==='student';
  const monthKey = new Date().toISOString().slice(0,7);
  const monthCount = list.filter(e=>e.date.startsWith(monthKey)).length;
  const streak = calcStreak(list);

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-head">
      <div>
        <h1>Daily Diary</h1>
        <p>${isStudent ? "A little note about your day, every day" : "Bilal's daily reflections"}</p>
      </div>
      ${isStudent ? `<button class="btn btn-primary" id="add-diary-btn">+ New Entry</button>` : ''}
    </div>
    <div class="stat-row">
      <div class="stat-card gold"><div class="label">Total entries</div><div class="value">${list.length}</div></div>
      <div class="stat-card teal"><div class="label">This month</div><div class="value">${monthCount}</div></div>
      <div class="stat-card rose"><div class="label">Current streak</div><div class="value">${streak} <small>day${streak===1?'':'s'}</small></div></div>
    </div>
    <div id="diary-list"></div>
  `;
  const wrap = document.getElementById('diary-list');
  if(!list.length){
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📔</div>No diary entries yet.${isStudent ? ' Tap "New Entry" to write your first one.' : ''}</div>`;
  }else{
    list.slice().sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt-a.createdAt)
      .forEach(e=> wrap.appendChild(renderDiaryCard(e, isStudent)));
  }
  if(isStudent){
    document.getElementById('add-diary-btn').addEventListener('click', ()=> openDiaryModal());
  }
}

function renderDiaryCard(e, isStudent){
  const el = document.createElement('div');
  el.className = 'diary-card';
  el.innerHTML = `
    <div class="diary-top">
      <div>
        <p class="diary-date">${fmtDate(e.date)}</p>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="diary-mood">${e.mood||''}</span>
        ${isStudent ? `<button class="btn-icon" data-act="edit">✎</button><button class="btn-icon" data-act="del">🗑</button>` : ''}
      </div>
    </div>
    <p class="diary-body">${e.text}</p>
  `;
  if(isStudent){
    el.querySelector('[data-act="edit"]').addEventListener('click', ()=> openDiaryModal(e));
    el.querySelector('[data-act="del"]').addEventListener('click', async ()=>{
      if(!confirm('Delete this diary entry?')) return;
      const list = (await getDiary()).filter(x=>x.id!==e.id);
      await saveDiary(list);
      showToast('Entry deleted');
      renderDiary();
    });
  }
  return el;
}

function openDiaryModal(e=null){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <h3>${e ? 'Edit Entry' : 'New Diary Entry'}</h3>
      <div class="field"><label>Date</label><input id="d-date" type="date" value="${e?e.date:todayStr()}" max="${todayStr()}"></div>
      <div class="field">
        <label>How was today?</label>
        <div class="mood-picker" id="d-mood-picker"></div>
      </div>
      <div class="field"><label>Today's note</label><textarea id="d-text" placeholder="What did you study, learn, or feel today?" style="min-height:110px;">${e?e.text:''}</textarea></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="d-cancel">Cancel</button>
        <button class="btn btn-primary" id="d-save">${e?'Save changes':'Save entry'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  let selectedMood = e ? e.mood : MOODS[0];
  const picker = backdrop.querySelector('#d-mood-picker');
  MOODS.forEach(m=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'mood-btn' + (m===selectedMood ? ' sel' : '');
    btn.textContent = m;
    btn.addEventListener('click', ()=>{
      selectedMood = m;
      picker.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('sel', b===btn));
    });
    picker.appendChild(btn);
  });

  backdrop.querySelector('#d-cancel').addEventListener('click', ()=>backdrop.remove());
  backdrop.querySelector('#d-save').addEventListener('click', async ()=>{
    const date = backdrop.querySelector('#d-date').value;
    const text = backdrop.querySelector('#d-text').value.trim();
    if(!date || !text){ showToast('Please add a date and a note'); return; }
    const list = await getDiary();
    if(e){
      const target = list.find(x=>x.id===e.id);
      Object.assign(target, { date, mood:selectedMood, text });
    }else{
      list.push({ id:uid(), date, mood:selectedMood, text, createdAt:Date.now() });
    }
    await saveDiary(list);
    backdrop.remove();
    showToast(e ? 'Entry updated' : 'Entry saved');
    renderDiary();
  });
}

/* ============================================================
   CHAT
============================================================ */
let chatPollTimer = null;
function stopChatPoll(){ if(chatPollTimer){ clearInterval(chatPollTimer); chatPollTimer = null; } }

async function getChatMessages(){ return (await storeGet('chat', true)) || []; }
async function saveChatMessages(list){ await storeSet('chat', list, true); }

async function renderChat(){
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="section-head">
      <div>
        <h1>Family Chat</h1>
        <p>A shared space for the whole family</p>
      </div>
    </div>
    <div class="chat-shell">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type a message..." autocomplete="off">
        <button id="chat-send">Send</button>
      </div>
    </div>
  `;
  await paintChat(true);

  const input = document.getElementById('chat-input');
  const send = async ()=>{
    const text = input.value.trim();
    if(!text) return;
    const list = await getChatMessages();
    list.push({ id:uid(), sender:currentUser.key, senderName:currentUser.name, text, time:Date.now() });
    await saveChatMessages(list);
    input.value = '';
    await paintChat(true);
  };
  document.getElementById('chat-send').addEventListener('click', send);
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') send(); });

  stopChatPoll();
  chatPollTimer = setInterval(()=> paintChat(false), 4000);
}

async function paintChat(scrollDown){
  const wrap = document.getElementById('chat-messages');
  if(!wrap) { stopChatPoll(); return; }
  const list = await getChatMessages();
  if(!list.length){
    wrap.innerHTML = `<div class="empty-state" style="border:none; background:transparent;"><div class="icon">💬</div>No messages yet. Say hello!</div>`;
    return;
  }
  wrap.innerHTML = '';
  list.forEach(m=>{
    const mine = m.sender === currentUser.key;
    const row = document.createElement('div');
    row.className = 'chat-bubble-row ' + (mine ? 'mine' : 'theirs');
    const time = new Date(m.time).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    row.innerHTML = `
      ${mine ? '' : `<div class="chat-sender">${m.senderName}</div>`}
      <div class="chat-bubble">${m.text.replace(/</g,'&lt;')}</div>
      <div class="chat-time">${time}</div>
    `;
    wrap.appendChild(row);
  });
  if(scrollDown) wrap.scrollTop = wrap.scrollHeight;
}
